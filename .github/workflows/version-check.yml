name: version-check

# wicked-understanding ships as skills (no package.json / npm publish), so its
# version lives in the VERSION file. This guard asserts VERSION matches the tag
# being pushed, so a release can never carry a stale or mismatched version.
on:
  push:
    tags:
      - 'v*'

jobs:
  version-matches-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Assert VERSION == tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${TAG#v}"
          echo "VERSION file : $FILE_VERSION"
          echo "git tag       : $TAG ($TAG_VERSION)"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION ($FILE_VERSION) does not match tag ($TAG_VERSION). Bump VERSION before tagging."
            exit 1
          fi
          echo "VERSION matches tag."
